name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # The flutter-action sets FLUTTER_ROOT, but let's be double sure
          if [ -z "$FLUTTER_ROOT" ]; then
            echo "flutter.sdk=$(which flutter | sed 's/\/bin\/flutter//')" >> android/local.properties
          else
            echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          fi
          cat android/local.properties

      - name: Build Debug APK
        run: |
          # Use --no-pub because we already ran flutter pub get
          # The -v (verbose) is crucial to see exactly where Gradle or the compiler fails
          flutter build apk --debug --verbose --no-pub
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
