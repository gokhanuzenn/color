name: Android Migration (v1 to v2)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/migrate.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Flutter
        uses: actions/checkout@v4
        # We need the subosito/flutter-action but let's use the actual action block
        # I'll write the proper step for it:
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Migrate Android Embedding
        run: |
          rm -rf android
          flutter create --platforms=android .
          flutter pub get

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GokhanUZEN"
          git config --global user.email "gokhanuzen@gmail.com"
          git add android/
          git commit -m "chore: migrate to android v2 embedding [skip ci]" || echo "No changes to commit"
          git push origin main
